<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Parental Control Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Écran de connexion -->
    <div id="loginScreen" style="display: flex; align-items: center; justify-content: center; height: 100vh;">
        <div class="login-card">
            <h1>Parental Control</h1>
            <input type="password" id="adminPassword" placeholder="Mot de passe">
            <button onclick="login()">Se connecter</button>
        </div>
    </div>

    <!-- Dashboard principal -->
    <div id="dashboardScreen" style="display: none;">
        <div class="top-bar">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <h2 id="pageTitle">Tableau de bord</h2>
            <select id="childSelect" onchange="onChildSelect()">
                <option value="">Sélectionner un enfant</option>
            </select>
            <button id="actionButton" onclick="showAddChildModal()">+ Ajouter un enfant</button>
        </div>

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="nav-item" data-tab="dashboard">📊 Dashboard</div>
            <div class="nav-item" data-tab="children">👶 Enfants</div>
            <div class="nav-item" data-tab="rules">⏰ Règles</div>
            <div class="nav-item" data-tab="notifications">📱 Notifications</div>
            <div class="nav-item" onclick="logout()">🚪 Déconnexion</div>
        </div>

        <!-- Contenu principal -->
        <div class="main-content">
            <!-- Section Dashboard (visible par défaut) -->
            <div id="childrenSection" class="section">
                <div class="section-header">
                    <h3>👶 Liste des enfants appairés</h3>
                    <button onclick="showAddChildModal()">+ Nouvel enfant</button>
                </div>
                <div id="childrenList" class="children-list"></div>
                <div><span id="totalChildren"></span> enfants</div>
            </div>

            <!-- Section Règles (cachée) -->
            <div id="rulesSection" class="section" style="display:none;">
                <div class="section-header">
                    <h3>⏰ Règles de blocage</h3>
                    <button onclick="showAddRuleModal()">+ Nouvelle règle</button>
                </div>
                <div id="rulesList" class="rules-list"></div>
            </div>

            <!-- Section Notifications (cachée) -->
            <div id="notificationsSection" class="section" style="display:none;">
                <div class="section-header">
                    <h3>📨 Flux de notifications</h3>
                </div>
                <div id="notificationsList" class="notifications-list"></div>
            </div>
        </div>
    </div>

    <!-- Modal Ajout Enfant -->
    <div id="addChildModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeAddChildModal()">&times;</span>
            <h3>Ajouter un enfant</h3>
            <input type="text" id="childDeviceName" placeholder="Nom de l'appareil">
            <button onclick="generatePairingCode()">Générer un code</button>
        </div>
    </div>

    <!-- Modal Code d'appairage -->
    <div id="pairingCodeModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closePairingCodeModal()">&times;</span>
            <h3>Code d'appairage</h3>
            <div id="pairingCodeDisplay" class="code-display">------</div>
            <button onclick="copyPairingCode()">Copier</button>
        </div>
    </div>

    <!-- Modal Règle -->
    <div id="ruleModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeRuleModal()">&times;</span>
            <h3 id="ruleModalTitle">Règle de blocage</h3>
            <select id="ruleChildId"></select>
            <select id="ruleDay">
                <option value="0">Dimanche</option><option value="1">Lundi</option><option value="2">Mardi</option>
                <option value="3">Mercredi</option><option value="4">Jeudi</option><option value="5">Vendredi</option>
                <option value="6">Samedi</option>
            </select>
            <input type="time" id="ruleStart" required>
            <input type="time" id="ruleEnd" required>
            <input type="text" id="ruleApp" placeholder="Package (optionnel)">
            <button onclick="submitRule()">Valider</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
